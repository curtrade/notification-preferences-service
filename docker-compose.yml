services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_preferences
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_preferences"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      LOG_LEVEL: log
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_preferences?schema=public
    ports:
      - "3000:3000"

volumes:
  pgdata:
